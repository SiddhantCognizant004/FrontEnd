<div class="a-page registration-page">
    <div class="registration-container">
        <form class="glass-form">
            <h2 class="form-title">Farmer Registration</h2>
            
            <div class="form-grid">
                <div class="input-box full-width">
                    <label>Full Name</label>
                    <input type="text" class="input-field" placeholder="Enter name">
                </div>

                <div class="input-box">
                    <label>Email</label>
                    <input type="email" class="input-field" placeholder="email@example.com">
                </div>

                <div class="input-box">
                    <label>Phone</label>
                    <input type="text" class="input-field" placeholder="10-digit number">
                </div>

                <div class="input-box full-width">
                    <label>Land Details</label>
                    <input type="text" class="input-field" placeholder="Survey / Record Number">
                </div>

                <div class="input-box full-width">
                    <label>Address</label>
                    <textarea class="input-field" rows="2"></textarea>
                </div>
            </div>

            <button type="submit" class="btn-primary">Create Account</button>
            
            <div class="form-footer">
                <p>Have an account? <a routerLink="/login">Login</a></p>
            </div>
        </form>
    </div>
</div>
